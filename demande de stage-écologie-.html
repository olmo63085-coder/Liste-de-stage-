<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>طلبات التربص الميداني | L2 بيئة ومحيط</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter','Cairo',sans-serif;
            background:#0A2F1A;
            color:#fff;
            padding:30px 20px;
            position:relative;
        }
        .nature-bg{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-2;
            background:url('https://images.pexels.com/photos/957024/forest-trees-perspective-bright-957024.jpeg?auto=compress&cs=tinysrgb&w=1600') no-repeat center center/cover;
            filter:brightness(0.7) saturate(1.2);
            background-size:cover;
        }
        .overlay-gradient{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
            background:linear-gradient(135deg,rgba(10,47,26,0.92),rgba(0,0,0,0.7));
        }
        .container{max-width:1300px;margin:0 auto;position:relative;z-index:2}
        
        .header{
            text-align:center;
            margin-bottom:35px;
            background:rgba(30,70,35,0.7);
            backdrop-filter:blur(10px);
            border-radius:60px;
            padding:30px;
            border:1px solid #D4A017;
        }
        .header h1{
            font-size:2.2rem;
            background:linear-gradient(135deg,#FFE7B0,#D4A017);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
        }
        .header p{color:#CFE6C5;margin-top:8px;}
        
        /* بطاقات الإحصائيات */
        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
            gap:20px;
            margin-bottom:35px;
        }
        .stat-card{
            background:rgba(30,70,35,0.7);
            backdrop-filter:blur(10px);
            border-radius:30px;
            padding:20px;
            text-align:center;
            border:1px solid #D4A017;
            transition:transform .2s;
        }
        .stat-card:hover{transform:translateY(-5px);}
        .stat-number{font-size:2.2rem;font-weight:800;color:#FFE7B0;}
        .stat-label{font-size:0.85rem;color:#CFE6C5;}
        
        /* شريط البحث */
        .search-wrapper{
            background:rgba(30,70,35,0.7);
            backdrop-filter:blur(10px);
            border-radius:60px;
            padding:20px 30px;
            margin-bottom:30px;
        }
        .search-title{
            text-align:center;
            margin-bottom:15px;
            font-size:1rem;
            color:#FFE7B0;
        }
        .search-box{
            position:relative;
            max-width:500px;
            margin:0 auto;
        }
        .search-box input{
            width:100%;
            padding:14px 20px 14px 50px;
            border-radius:60px;
            border:none;
            background:#1A3A22;
            color:#fff;
            font-size:1rem;
            text-align:center;
            transition:0.2s;
        }
        .search-box input:focus{
            outline:none;
            border:1px solid #D4A017;
            box-shadow:0 0 10px rgba(212,160,23,0.4);
        }
        .search-box i{
            position:absolute;
            right:20px;
            top:50%;
            transform:translateY(-50%);
            color:#D4A017;
            font-size:1.1rem;
        }
        .search-info{
            text-align:center;
            margin-top:12px;
            font-size:0.8rem;
            color:#CFE6C5;
        }
        
        /* الجدول */
        .table-wrapper{
            background:rgba(20,45,30,0.7);
            backdrop-filter:blur(8px);
            border-radius:30px;
            overflow-x:auto;
            padding:5px;
            transition:0.2s;
        }
        table{
            width:100%;
            border-collapse:collapse;
            font-size:0.85rem;
        }
        th{
            background:#0D3B26;
            padding:15px 12px;
            text-align:center;
            border-bottom:2px solid #D4A017;
        }
        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid rgba(212,160,23,0.2);
        }
        tr:hover{background:rgba(212,160,23,0.1);}
        .highlight-row{
            background:rgba(212,160,23,0.25);
            animation:highlightPulse 0.6s ease;
        }
        @keyframes highlightPulse{
            0%{background:rgba(212,160,23,0);}
            50%{background:rgba(212,160,23,0.5);}
            100%{background:rgba(212,160,23,0.25);}
        }
        .missing-place{
            background:rgba(200,50,50,0.2);
            color:#ffaaaa;
        }
        .badge-missing{
            background:#c62828;
            padding:4px 12px;
            border-radius:30px;
            font-size:0.7rem;
            display:inline-block;
        }
        
        /* ملاحظة */
        .note-box{
            background:rgba(0,0,0,0.4);
            border-radius:25px;
            padding:15px 25px;
            margin-top:25px;
            border-right:4px solid #c62828;
            font-size:0.85rem;
        }
        
        footer{
            text-align:center;
            margin-top:40px;
            font-size:0.75rem;
            color:#98bb92;
        }
        
        @media(max-width:768px){
            th,td{font-size:0.7rem;padding:8px;}
            .search-box input{font-size:0.9rem;}
        }
    </style>
</head>
<body>
<div class="nature-bg"></div>
<div class="overlay-gradient"></div>
<div class="container">
    <div class="header">
        <h1>🌿 طلبات التربص الميداني 🌿</h1>
        <p>السنة الثانية L2 - تخصص البيئة والمحيط | دفعة 2025/2026</p>
    </div>
    
    <div class="stats-grid" id="statsGrid"></div>
    
    <!-- شريط البحث المركزي -->
    <div class="search-wrapper">
        <div class="search-title">
            <i class="fas fa-search"></i> ابحث عن معلومات تربصك
        </div>
        <div class="search-box">
            <i class="fas fa-user-graduate"></i>
            <input type="text" id="searchInput" placeholder="اكتب اسمك أو لقبك هنا...">
        </div>
        <div class="search-info">
            💡 اكتب اسمك وستظهر لك معلومات تربصك مباشرة
        </div>
    </div>
    
    <!-- الجدول -->
    <div class="table-wrapper">
        <table id="studentsTable">
            <thead>
                <tr>
                    <th>الاسم واللقب</th>
                    <th>رقم التسجيل</th>
                    <th>Lieu de stage</th>
                    <th>البلدية</th>
                    <th>الحالة</th>
                  </tr>
            </thead>
            <tbody id="tableBody"></tbody>
         </table>
    </div>
    
    <div class="note-box" id="missingNote"></div>
    <footer>📌 اكتب اسمك في مربع البحث أعلاه لترى معلومات تربصك مباشرة</footer>
</div>

<script>
    // ========== البيانات الموحدة ==========
    const studentsRaw = [
        {nom:"Hadri alaa amina", matricule:"39179804", lieu:"المؤسسة الاستشفائية العمومية سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"hathati zineb souad", matricule:"39194417", lieu:"المؤسسة الاستشفائية العمومية حنيشي مصطفى", municipalite:"الجلفة"},
        {nom:"tenah imane", matricule:"39147610", lieu:"العيادة المتعددة الخدمات", municipalite:"عين اسرار الجلفة"},
        {nom:"Benouda soulef", matricule:"39179204", lieu:"مختبر التحاليل", municipalite:"الجلفة"},
        {nom:"Reguieg ikram", matricule:"39136903", lieu:"مختبر التحاليل", municipalite:"الجلفة"},
        {nom:"Rebhi Mohamed", matricule:"39179804", lieu:"المؤسسة الاستشفائية سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"Selami amal samia", matricule:"39146014", lieu:"المؤسسة الاستشفائية محاد عبد القادر", municipalite:"الجلفة"},
        {nom:"Elaguab lina hind", matricule:"39188601", lieu:"المؤسسة الاستشفائية العقيد احمد بوقرة", municipalite:"حاسي بحبح"},
        {nom:"Hamira abdelkarim", matricule:"39210411", lieu:"العيادة المتعددة الخدمات", municipalite:"الشارف"},
        {nom:"Houicher Aicha", matricule:"39194615", lieu:"العيادة المتعددة الخدمات", municipalite:"عين الشهداء"},
        {nom:"Serra sara", matricule:"39170307", lieu:"المؤسسة الاستشفائية الشهيد هاني محمد بن الهادي", municipalite:"مسعد"},
        {nom:"Daoudi rahaf salsabil", matricule:"39187803", lieu:"مديرية البيئة", municipalite:"الجلفة"},
        {nom:"saada yacine abderrahmane", matricule:"39163408", lieu:"مستشفى الأمراض السرطانية المجاهد العقيد احمد بن شريف", municipalite:"الجلفة"},
        {nom:"Drifel rahima", matricule:"39178912", lieu:"مختبر التحاليل", municipalite:"عين وسارة"},
        {nom:"Goumichi nadjet", matricule:"39189220", lieu:null, municipalite:null},
        {nom:"Choucha basmala", matricule:"39178603", lieu:"المؤسسة الاستشفائية سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"Nekiche fatna", matricule:"39179601", lieu:"المؤسسة الاستشفائية سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"Chegaf aicha nourelhoda", matricule:"39160408", lieu:"المؤسسة الاستشفائية", municipalite:"مسعد"},
        {nom:"Zouina hocini", matricule:"39187815", lieu:"المؤسسة الاستشفائية العقيد احمد بوقرة", municipalite:"حاسي بحبح"},
        {nom:"Kadous Faten rahaf", matricule:"39179505", lieu:"مخبر التحاليل", municipalite:"عين وسارة"},
        {nom:"Barboura fatma", matricule:"39160703", lieu:"المؤسسة الاستشفائية هاني محمد بن الهادي", municipalite:"مسعد"},
        {nom:"Cherrak djihad", matricule:"39148410", lieu:null, municipalite:null},
        {nom:"Nekbil zakaria", matricule:"39150107", lieu:"مستشفى الأمراض السرطانية العقيد احمد بن شريف", municipalite:"الجلفة"},
        {nom:"Ghezal achouak meriem", matricule:"39169505", lieu:"المؤسسة الاستشفائية هاني محمد بن الهادي", municipalite:"مسعد"},
        {nom:"Nour el houda reguieg", matricule:"39156418", lieu:"المؤسسة الاستشفائية هتهات بوبكر", municipalite:"الجلفة"},
        {nom:"Maamri nour el imane", matricule:"39201212", lieu:"المؤسسة الاستشفائية مجاهد سلماني سليمان", municipalite:"دار الشيوخ"},
        {nom:"Hamidat saadia nabila", matricule:"39147208", lieu:"المؤسسة الاستشفائية محاد عبد القادر", municipalite:"الجلفة"},
        {nom:"Brahimi linda nour el imane", matricule:"39153913", lieu:null, municipalite:null},
        {nom:"Mecheri aya", matricule:"39147512", lieu:"المؤسسة الاستشفائية الام والطفل", municipalite:"الجلفة"},
        {nom:"Ouazzani nour elhouda", matricule:"39180210", lieu:"المؤسسة الاستشفائية سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"Bentahar karima", matricule:"39188602", lieu:"مديرية البيئة", municipalite:"الجلفة"},
        {nom:"talbi khaoula", matricule:"39149202", lieu:"مركز مكافحة السرطان العقيد احمد بن شريف", municipalite:"الجلفة"},
        {nom:"Harti hibat elrahmane", matricule:"39180220", lieu:"مخبر التحاليل بالمستشفى العمومي سعداوي المختار", municipalite:"عين وسارة"},
        {nom:"Kerma inas", matricule:"39146617", lieu:"المؤسسة الاستشفائية محمدي مصطفى بن عبد القادر", municipalite:"الجلفة"}
    ];
    
    function capitalizeName(str){
        if(!str) return str;
        return str.split(' ').map(word=>word.charAt(0).toUpperCase()+word.slice(1).toLowerCase()).join(' ');
    }
    
    const students = studentsRaw.map(s => ({
        nom: capitalizeName(s.nom),
        matricule: s.matricule,
        lieu: s.lieu,
        municipalite: s.municipalite ? (s.municipalite.includes('الجلفة')?'الجلفة':s.municipalite) : null,
        aPlace: s.lieu !== null
    }));
    
    function updateStats(){
        const total = students.length;
        const withPlace = students.filter(s=>s.aPlace).length;
        const missing = total - withPlace;
        const byMunicipality = {};
        students.filter(s=>s.municipalite).forEach(s=>{
            byMunicipality[s.municipalite] = (byMunicipality[s.municipalite]||0)+1;
        });
        const statsHtml = `
            <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">👨‍🎓 إجمالي الطلاب</div></div>
            <div class="stat-card"><div class="stat-number">${withPlace}</div><div class="stat-label">🏥 حددوا مكان التربص</div></div>
            <div class="stat-card"><div class="stat-number" style="color:#ffaaaa;">${missing}</div><div class="stat-label">⚠️ لم يحددوا مكان التربص</div></div>
            <div class="stat-card"><div class="stat-number">${Object.keys(byMunicipality).length}</div><div class="stat-label">🏙️ بلديات مختلفة</div></div>
        `;
        document.getElementById('statsGrid').innerHTML = statsHtml;
        const missingNames = students.filter(s=>!s.aPlace).map(s=>s.nom).join('، ');
        document.getElementById('missingNote').innerHTML = missingNames ? `⚠️ <strong>ملاحظة:</strong> الطلاب التالية أسماؤهم لم يحددوا مكان التربص: ${missingNames}. يرجى مراجعتهم لتحديد مؤسستهم.` : '✅ جميع الطلاب حددوا أماكن تربصهم.';
    }
    
    let currentData = [...students];
    let lastSearchTerm = '';
    
    function renderTable(){
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        if(currentData.length===0){
            const row = tbody.insertRow();
            row.insertCell(0).colSpan=5;
            row.insertCell(0).innerHTML = '<div style="text-align:center;padding:40px;">🔍 لم يتم العثور على طالب بهذا الاسم. تأكد من كتابة اسمك بشكل صحيح.</div>';
            return;
        }
        currentData.forEach(s=>{
            const row = tbody.insertRow();
            if(!s.aPlace) row.classList.add('missing-place');
            row.insertCell(0).innerHTML = `<strong>${s.nom}</strong>`;
            row.insertCell(1).innerText = s.matricule;
            row.insertCell(2).innerHTML = s.lieu ? s.lieu : `<span class="badge-missing">❌ لم يحدد</span>`;
            row.insertCell(3).innerText = s.municipalite || '—';
            row.insertCell(4).innerHTML = s.aPlace ? '✅ محدد' : '⚠️ غير محدد';
        });
        updateStats();
    }
    
    function filterAndHighlight(){
        const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!searchTerm){
            currentData = [...students];
            renderTable();
            return;
        }
        const filtered = students.filter(s=>s.nom.toLowerCase().includes(searchTerm) || s.matricule.includes(searchTerm));
        currentData = filtered;
        renderTable();
        if(filtered.length===1){
            const rows = document.querySelectorAll('#tableBody tr');
            if(rows[0]) rows[0].classList.add('highlight-row');
        }
    }
    
    document.getElementById('searchInput').addEventListener('input',filterAndHighlight);
    
    filterAndHighlight();
</script>
</body>
</html>
