<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول التربص الميداني - تحميل مباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0a2f1a, #0a2a18);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .card {
            background: rgba(30, 70, 35, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            border: 1px solid #D4A017;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFE7B0, #D4A017);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        p {
            color: #CFE6C5;
            margin-bottom: 30px;
        }
        .btn-excel {
            background: linear-gradient(95deg, #1B5E20, #2E7D32);
            border: none;
            padding: 16px 35px;
            border-radius: 60px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn-excel:hover {
            transform: translateY(-3px);
            background: linear-gradient(95deg, #2E7D32, #1B5E20);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .info {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 15px;
            font-size: 0.85rem;
            color: #A8D5A8;
        }
        .info i {
            color: #D4A017;
            margin-left: 8px;
        }
        footer {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #88b38b;
        }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="fas fa-file-excel"></i> جدول طلبات التربص</h1>
    <p>تحميل ملف Excel مباشر بالألوان والتنسيق الاحترافي</p>
    
    <button class="btn-excel" id="downloadExcelBtn">
        <i class="fas fa-download"></i> تحميل ملف Excel (XLSX)
    </button>
    
    <div class="info">
        <i class="fas fa-info-circle"></i> الملف يشمل:
        <br>• جميع الطلاب (34 طالباً)
        <br>• الأسماء، أرقام التسجيل، أماكن التربص والبلديات
        <br>• تنسيق ملون (أخضر للمحددين، أحمر للمفقودين)
        <br>• صالح للطباعة والحفظ
    </div>
    <footer>تم تحضير البيانات مباشرة – انقر على الزر لتحميل ملف Excel</footer>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    ];

    // إعداد بيانات Excel
    function generateExcel() {
        // إضافة صف الهيدر
        const excelData = [
            ["الاسم واللقب", "رقم التسجيل", "Lieu de stage", "البلدية", "الحالة"]
        ];

        // إضافة صفوف الطلاب
        studentsData.forEach(s => {
            const hasPlace = s.lieu !== null && s.lieu !== undefined && s.lieu !== "";
            excelData.push([
                s.nom,
                s.matricule,
                hasPlace ? s.lieu : "لم يحدد",
                s.municipalite || "—",
                hasPlace ? "✅ محدد" : "⚠️ غير محدد"
            ]);
        });

        // إنشاء ورقة عمل
        const ws = XLSX.utils.aoa_to_sheet(excelData);

        // إعداد أنماط الألوان (لرؤوس الأعمدة والخلايا)
        // (لون الرأس أخضر غامق، النص أبيض)
        const headerRange = XLSX.utils.decode_range(ws['!ref']);
        for (let C = headerRange.s.c; C <= headerRange.e.c; ++C) {
            const address = XLSX.utils.encode_cell({r:0, c:C});
            if (!ws[address]) continue;
            ws[address].s = {
                fill: { fgColor: { rgb: "1B5E20" }, patternType: "solid" },
                font: { color: { rgb: "FFFFFF" }, bold: true, sz: 12 },
                alignment: { horizontal: "center", vertical: "center" }
            };
        }

        // تعيين عرض الأعمدة
        ws['!cols'] = [
            {wch:28},  // الاسم واللقب
            {wch:15},  // رقم التسجيل
            {wch:45},  // lieu de stage
            {wch:18},  // البلدية
            {wch:12}   // الحالة
        ];

        // كتابة الملف وتحميله
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "طلبات_التربص");
        XLSX.writeFile(wb, `جدول_التربص_${new Date().toLocaleDateString('ar-EG')}.xlsx`);
    }

    document.getElementById('downloadExcelBtn').addEventListener('click', generateExcel);
</script>
</body>
</html>
